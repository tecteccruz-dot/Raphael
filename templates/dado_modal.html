<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D20</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #07030f;
      font-family: 'Cinzel', 'Palatino Linotype', serif;
      color: #e0d4c0; overflow: hidden;
    }

    .panel {
      width: min(94vw, 430px); padding: 22px 20px 20px; border-radius: 24px;
      background: linear-gradient(160deg,rgba(26,9,48,.82) 0%,rgba(8,3,17,.92) 100%);
      border: 1px solid rgba(175,135,65,.17);
      box-shadow: 0 28px 72px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.05), inset 0 -1px 0 rgba(0,0,0,.4);
      text-align: center;
    }
    .title {
      font-family: 'Cinzel Decorative','Palatino Linotype',serif;
      font-size: clamp(1.2rem,4vw,1.5rem); letter-spacing: 6px;
      background: linear-gradient(170deg,#fff5a0,#e8b840 45%,#9a5e10);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .sub { font-size:.65rem; letter-spacing:3px; text-transform:uppercase; color:rgba(195,175,220,.3); margin:3px 0 12px; }

    /* ── CONTROLES ── */
    .controls {
      display:flex; align-items:center; justify-content:center; gap:10px;
      padding:10px 14px; border-radius:13px; background:rgba(0,0,0,.28);
      border:1px solid rgba(175,135,65,.12); margin-bottom:12px;
    }
    .ctrl-group { display:flex; align-items:center; gap:7px; flex:1; justify-content:center; }
    .ctrl-info  { text-align:center; }
    .ctrl-lbl   { display:block; font-size:.58rem; letter-spacing:2px; text-transform:uppercase; color:rgba(200,180,230,.35); margin-bottom:1px; }
    .ctrl-num   { font-family:'Cinzel Decorative',serif; font-size:1.15rem; font-weight:700; color:#e8b840; min-width:34px; text-align:center; line-height:1; }
    .ctrl-num.dc-hi   { color:#ff7060; }
    .ctrl-num.dc-low  { color:#70e880; }
    .ctrl-num.mod-pos { color:#70c8f8; }
    .ctrl-num.mod-neg { color:#f87070; }
    .ctrl-buttons { display:flex; flex-direction:column; gap:3px; }
    .ctrl-btn {
      width:23px; height:23px; border:1px solid rgba(175,135,65,.28); border-radius:6px;
      background:rgba(180,140,30,.1); color:#ddb840; font-size:.85rem; font-weight:700; cursor:pointer;
      display:flex; align-items:center; justify-content:center; line-height:1; transition:background .15s,transform .1s; padding:0;
    }
    .ctrl-btn:hover  { background:rgba(180,140,30,.26); }
    .ctrl-btn:active { transform:scale(.88); }
    .ctrl-sep { width:1px; height:36px; background:rgba(175,135,65,.18); flex-shrink:0; }

    /* ── CANVAS ── */
    #wrap {
      width:100%; max-width:320px; aspect-ratio:1;
      margin:0 auto; position:relative; overflow:visible;
    }
    #wrap::before {
      content:''; position:absolute; inset:18%; border-radius:50%;
      background:radial-gradient(circle,rgba(110,35,190,.11) 0%,transparent 70%);
      pointer-events:none; animation:gp 3.5s ease-in-out infinite;
    }
    @keyframes gp { 0%,100%{opacity:.5;transform:scale(.94)} 50%{opacity:1;transform:scale(1.06)} }

    /* ── TEXTO FLOTANTE SOBRE EL DADO ── */
    #floating-text {
      position:absolute; top:44%; left:50%;
      transform:translate(-50%,-50%) scale(0);
      pointer-events:none; z-index:20;
      font-family:'Cinzel Decorative',serif; font-weight:700;
      font-size:clamp(1.65rem,7vw,2.3rem); letter-spacing:5px;
      white-space:nowrap; opacity:0;
    }
    #floating-text.show-crit {
      animation:ft-crit 3.0s cubic-bezier(.22,1,.36,1) forwards;
      color:#ffe040;
      text-shadow:
        0 0 6px #fffce0,
        0 0 18px rgba(255,220,30,1),
        0 0 36px rgba(255,165,0,.95),
        0 0 60px rgba(255,100,0,.65);
    }
    #floating-text.show-disaster {
      animation:ft-disaster 3.0s cubic-bezier(.22,1,.36,1) forwards;
      color:#ff2828;
      text-shadow:
        0 0 6px rgba(255,200,200,.5),
        0 0 18px rgba(230,30,30,1),
        0 0 36px rgba(180,0,0,.9),
        0 0 60px rgba(100,0,0,.55);
    }
    @keyframes ft-crit {
      0%   { opacity:0; transform:translate(-50%,-50%) scale(0.08) rotate(-6deg); }
      12%  { opacity:1; transform:translate(-50%,-50%) scale(1.45) rotate(2deg); }
      22%  { transform:translate(-50%,-50%) scale(0.92) rotate(0deg); }
      32%  { transform:translate(-50%,-50%) scale(1.06); }
      45%  { opacity:1; transform:translate(-50%,-50%) scale(1.0); }
      72%  { opacity:1; transform:translate(-50%,-62%) scale(1.0); }
      100% { opacity:0; transform:translate(-50%,-82%) scale(0.88); }
    }
    @keyframes ft-disaster {
      0%   { opacity:0; transform:translate(-50%,-50%) scale(0.08); }
      12%  { opacity:1; transform:translate(-50%,-50%) scale(1.35); }
      18%  { transform:translate(-53%,-50%) scale(1.0); }
      22%  { transform:translate(-47%,-50%) scale(1.0); }
      26%  { transform:translate(-52%,-50%) scale(1.0); }
      30%  { transform:translate(-50%,-50%) scale(1.0); }
      45%  { opacity:1; transform:translate(-50%,-50%) scale(1.0); }
      72%  { opacity:1; transform:translate(-50%,-62%) scale(1.0); }
      100% { opacity:0; transform:translate(-50%,-82%) scale(0.88); }
    }

    /* ── RESULTADO ── */
    .result-area {
      position:relative; min-height:5.2rem;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      margin:4px 0 4px;
    }
    .result-row { display:flex; align-items:baseline; justify-content:center; gap:8px; }

    #result {
      font-family:'Cinzel Decorative',serif;
      font-size:clamp(2.3rem,7vw,2.9rem); font-weight:700; line-height:1;
      background:linear-gradient(175deg,#fff5a0,#e8b840 50%,#9a5e10);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      filter:drop-shadow(0 0 12px rgba(225,175,45,.4));
    }
    #result.rolling { background:linear-gradient(175deg,#bbb,#666); -webkit-background-clip:text; background-clip:text; filter:none; opacity:.6; }
    #result.won     { background:linear-gradient(175deg,#c0ffcc,#44dd66 40%,#228844); -webkit-background-clip:text; background-clip:text; filter:drop-shadow(0 0 16px rgba(60,220,80,.65)); animation:win-pop .7s cubic-bezier(.34,1.56,.64,1); }
    #result.lost    { background:linear-gradient(175deg,#ffaaaa,#dd3333); -webkit-background-clip:text; background-clip:text; filter:drop-shadow(0 0 12px rgba(220,50,50,.6)); animation:shake .55s ease-in-out; }
    #result.tick    { animation:count-tick .14s ease-out; }
    /* Crítico: dorado ardiente */
    #result.critical {
      background:linear-gradient(175deg,#fff 0%,#ffe060 25%,#ffaa00 60%,#ff6600 100%);
      -webkit-background-clip:text; background-clip:text;
      filter:drop-shadow(0 0 20px rgba(255,200,30,1)) drop-shadow(0 0 8px rgba(255,120,0,.8));
      animation:crit-pop .8s cubic-bezier(.34,1.56,.64,1);
    }
    /* Desastre: rojo oscuro */
    #result.disaster {
      background:linear-gradient(175deg,#ffa0a0,#ff2020 40%,#880000);
      -webkit-background-clip:text; background-clip:text;
      filter:drop-shadow(0 0 18px rgba(220,30,30,.9));
      animation:disaster-pop .7s cubic-bezier(.34,1.56,.64,1);
    }

    @keyframes win-pop      { 0%{transform:scale(.85)} 60%{transform:scale(1.14)} 100%{transform:scale(1)} }
    @keyframes shake        { 0%,100%{transform:translateX(0)} 12%{transform:translateX(-10px)} 25%{transform:translateX(10px)} 37%{transform:translateX(-7px)} 50%{transform:translateX(7px)} 62%{transform:translateX(-4px)} 75%{transform:translateX(4px)} 87%{transform:translateX(-2px)} }
    @keyframes count-tick   { 0%{transform:scale(1)} 40%{transform:scale(1.1)} 100%{transform:scale(1)} }
    @keyframes crit-pop     { 0%{transform:scale(.6)} 50%{transform:scale(1.22)} 75%{transform:scale(.97)} 100%{transform:scale(1)} }
    @keyframes disaster-pop { 0%{transform:scale(.6)} 50%{transform:scale(1.18)} 75%{transform:scale(.98)} 100%{transform:scale(1)} }

    /* Modificador contador */
    #mod-counter {
      font-family:'Cinzel Decorative',serif; font-size:clamp(1.15rem,3.5vw,1.45rem); font-weight:700; line-height:1;
      opacity:0; transform:translateX(-8px) scale(.8); transition:opacity .22s,transform .22s; pointer-events:none;
    }
    #mod-counter.show { opacity:1; transform:translateX(0) scale(1); }
    #mod-counter.pos  { color:#70c8f8; filter:drop-shadow(0 0 7px rgba(100,200,255,.45)); }
    #mod-counter.neg  { color:#f87070; filter:drop-shadow(0 0 7px rgba(255,100,100,.45)); }

    /* Calc line */
    #calc-line {
      font-size:.7rem; letter-spacing:1px; color:rgba(210,195,160,.42);
      margin-top:3px; min-height:1em; opacity:0; transform:translateY(4px);
      transition:opacity .35s .1s,transform .35s .1s;
    }
    #calc-line.show  { opacity:1; transform:translateY(0); }
    #calc-line .mod-pos  { color:#70c8f8; }
    #calc-line .mod-neg  { color:#f87070; }
    #calc-line .total    { color:#e8c870; font-weight:700; }
    #calc-line .dc-ref   { color:rgba(200,180,230,.38); }
    #calc-line .nat20    { color:rgba(255,210,50,.8); letter-spacing:2px; }
    #calc-line .nat1     { color:rgba(255,100,100,.75); letter-spacing:2px; }

    /* Veredicto */
    #outcome {
      font-size:.92rem; letter-spacing:5px; font-weight:700; text-transform:uppercase;
      margin-top:5px; min-height:1.3em;
      opacity:0; transform:scale(.8) translateY(5px);
      transition:opacity .45s cubic-bezier(.34,1.56,.64,1), transform .45s cubic-bezier(.34,1.56,.64,1);
    }
    #outcome.show { opacity:1; transform:scale(1) translateY(0); }
    #outcome.win  { color:#58e870; filter:drop-shadow(0 0 8px rgba(60,230,80,.5)); }
    #outcome.lose { color:#ff4848; filter:drop-shadow(0 0 8px rgba(220,40,40,.45)); }

    /* Chispas */
    @keyframes sparkle-fly { 0%{opacity:1;transform:translate(0,0) rotate(0deg) scale(1)} 100%{opacity:0;transform:translate(var(--tx),var(--ty)) rotate(var(--tr)) scale(.1)} }
    .sparkle { position:absolute; pointer-events:none; animation:sparkle-fly .9s ease-out forwards; font-size:14px; line-height:1; }

    /* Destellos de pantalla para crítico/desastre */
    #flash-overlay {
      position:fixed; inset:0; pointer-events:none; z-index:5; opacity:0;
    }
    #flash-overlay.flash-gold    { animation:flash-g .5s ease-out forwards; background:radial-gradient(ellipse at center,rgba(255,200,30,.18) 0%,transparent 70%); }
    #flash-overlay.flash-crimson { animation:flash-r .5s ease-out forwards; background:radial-gradient(ellipse at center,rgba(200,20,20,.2) 0%,transparent 70%); }
    @keyframes flash-g { 0%{opacity:0} 15%{opacity:1} 100%{opacity:0} }
    @keyframes flash-r { 0%{opacity:0} 15%{opacity:1} 100%{opacity:0} }

    /* SEP / BOTÓN */
    .sep { height:1px; margin:10px 0; background:linear-gradient(90deg,transparent,rgba(155,115,240,.14),transparent); }
    #btn {
      width:100%; padding:13px; font-family:'Cinzel',serif; font-size:.88rem; font-weight:700;
      letter-spacing:5px; text-transform:uppercase; border:none; border-radius:13px; cursor:pointer; color:#190808;
      background:linear-gradient(135deg,#c08820,#f0d060 45%,#c07020);
      box-shadow:0 6px 22px rgba(185,140,22,.4),0 2px 0 rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.18);
      transition:transform .16s,box-shadow .16s,opacity .2s; position:relative;
    }
    #btn::after { content:''; position:absolute; inset:0; border-radius:inherit; background:linear-gradient(180deg,rgba(255,255,255,.14) 0%,transparent 52%); pointer-events:none; }
    #btn:hover:not(:disabled)  { transform:translateY(-2px); box-shadow:0 12px 30px rgba(185,140,22,.52),0 2px 0 rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.18); }
    #btn:active:not(:disabled) { transform:translateY(1px); }
    #btn:disabled { opacity:.42; cursor:not-allowed; }
  </style>
</head>
<body>

<!-- Destello de pantalla -->
<div id="flash-overlay"></div>

<div class="panel">
  <div class="title">D20</div>
  <div class="sub">Dado de Accion</div>

  <div class="controls">
    <div class="ctrl-group">
      <div class="ctrl-info">
        <span class="ctrl-lbl">Dificultad</span>
        <div class="ctrl-num" id="dc-val">18</div>
      </div>
      <div class="ctrl-buttons">
        <button class="ctrl-btn" onclick="adj('dc',1)">+</button>
        <button class="ctrl-btn" onclick="adj('dc',-1)">−</button>
      </div>
    </div>
    <div class="ctrl-sep"></div>
    <div class="ctrl-group">
      <div class="ctrl-info">
        <span class="ctrl-lbl">Modificador</span>
        <div class="ctrl-num" id="mod-val">+0</div>
      </div>
      <div class="ctrl-buttons">
        <button class="ctrl-btn" onclick="adj('mod',1)">+</button>
        <button class="ctrl-btn" onclick="adj('mod',-1)">−</button>
      </div>
    </div>
  </div>

  <div id="wrap">
    <!-- Texto flotante para Crítico / Desastre -->
    <div id="floating-text"></div>
  </div>

  <div class="result-area" id="result-area">
    <div class="result-row">
      <div id="result">D20</div>
      <div id="mod-counter"></div>
    </div>
    <div id="calc-line"></div>
    <div id="outcome"></div>
  </div>

  <div class="sep"></div>
  <button id="btn" onclick="launch()">Lanzar Dado</button>
</div>

<script>
/* ══════════════════════════════════════════════
   CONTROLES
══════════════════════════════════════════════ */
let dcVal=18, modVal=0;
const dcEl=document.getElementById('dc-val'), modEl=document.getElementById('mod-val');

function adj(type,delta){
  if(type==='dc'){
    dcVal=Math.max(1,Math.min(30,dcVal+delta));          // mínimo 1
    dcEl.textContent=dcVal;
    dcEl.className='ctrl-num'+(dcVal>=20?' dc-hi':dcVal<=5?' dc-low':'');
  }else{
    modVal=Math.max(-10,Math.min(10,modVal+delta));
    modEl.textContent=modVal>=0?`+${modVal}`:`${modVal}`;
    modEl.className='ctrl-num'+(modVal>0?' mod-pos':modVal<0?' mod-neg':'');
  }
}

/* ══════════════════════════════════════════════
   THREE.JS
══════════════════════════════════════════════ */
const wrap=document.getElementById('wrap');
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(42,1,0.1,100);
camera.position.set(0,0,8);
const renderer=new THREE.WebGLRenderer({alpha:true,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(wrap.clientWidth,wrap.clientHeight);
renderer.setClearColor(0x000000,0);
wrap.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x8060b0,.52));
const keyL=new THREE.DirectionalLight(0xfff8e8,2.5); keyL.position.set(4,6,6); scene.add(keyL);
const fillL=new THREE.DirectionalLight(0x3820a0,.9); fillL.position.set(-5,-2,3); scene.add(fillL);
const rimL=new THREE.DirectionalLight(0xff8830,.9); rimL.position.set(1,-7,-5); scene.add(rimL);
const ptL=new THREE.PointLight(0xb090ff,.5,22); ptL.position.set(0,7,3); scene.add(ptL);

/* ── GEOMETRÍA ── */
const origGeo=new THREE.IcosahedronGeometry(2,0);
const baseGeo=origGeo.toNonIndexed();
const posAttr=baseGeo.attributes.position, uvAttr=baseGeo.attributes.uv;
const WORLD_UP=new THREE.Vector3(0,1,0);
const faceData=[];

for(let i=0;i<20;i++){
  const vi=i*3;
  const verts=[0,1,2].map(k=>new THREE.Vector3(posAttr.getX(vi+k),posAttr.getY(vi+k),posAttr.getZ(vi+k)));
  const center=new THREE.Vector3().add(verts[0]).add(verts[1]).add(verts[2]).divideScalar(3);
  const normal=center.clone().normalize();
  let tU=new THREE.Vector3().crossVectors(WORLD_UP,normal);
  if(tU.lengthSq()<1e-6) tU.set(1,0,0);
  tU.normalize();
  const tV=new THREE.Vector3().crossVectors(normal,tU).normalize();
  const scale=Math.max(...verts.map(v=>v.distanceTo(center)))*1.18;
  verts.forEach((v,k)=>{
    const d=v.clone().sub(center);
    uvAttr.setXY(vi+k,0.5+d.dot(tU)/(2*scale),0.5+d.dot(tV)/(2*scale));
  });
  baseGeo.addGroup(vi,3,i);
  faceData.push({number:i+1,normalLocal:normal.clone(),tV:tV.clone()});
}
uvAttr.needsUpdate=true;

function makeFaceTex(num){
  const SZ=512,cx=256,cy=256;
  const cv=document.createElement('canvas'); cv.width=cv.height=SZ;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#880c28'; ctx.fillRect(0,0,SZ,SZ);
  for(let n=0;n<1200;n++){ctx.fillStyle=`rgba(255,255,255,${Math.random()*.033})`;ctx.fillRect(Math.random()*SZ,Math.random()*SZ,1.4,1.4);}
  const halo=ctx.createRadialGradient(cx,cy,SZ*.18,cx,cy,SZ*.47);
  halo.addColorStop(0,'rgba(175,105,22,.28)');halo.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=halo;ctx.beginPath();ctx.arc(cx,cy,SZ*.47,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,SZ*.355,0,Math.PI*2);ctx.fillStyle='rgba(3,1,10,.91)';ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,SZ*.355,0,Math.PI*2);ctx.strokeStyle='rgba(205,155,32,.96)';ctx.lineWidth=SZ*.025;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,SZ*.30,0,Math.PI*2);ctx.strokeStyle='rgba(255,210,85,.18)';ctx.lineWidth=SZ*.008;ctx.stroke();
  const dr=SZ*.33;
  for(let a=0;a<6;a++){const ang=(a/6)*Math.PI*2;ctx.beginPath();ctx.arc(cx+Math.cos(ang)*dr,cy+Math.sin(ang)*dr,SZ*.013,0,Math.PI*2);ctx.fillStyle='rgba(205,160,38,.7)';ctx.fill();}
  const fs=num>=10?SZ*.355:SZ*.42;
  ctx.font=`900 ${fs}px "Cinzel Decorative","Palatino","Times New Roman",serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='rgba(255,175,35,.78)';ctx.shadowBlur=SZ*.055;
  const tg=ctx.createLinearGradient(cx,cy-fs*.5,cx,cy+fs*.5);
  tg.addColorStop(0,'#fffab8');tg.addColorStop(.38,'#f5cc40');tg.addColorStop(1,'#a85c0e');
  ctx.fillStyle=tg;ctx.fillText(String(num),cx,cy+SZ*.022);
  const tex=new THREE.CanvasTexture(cv);
  tex.minFilter=THREE.LinearMipmapLinearFilter;tex.generateMipmaps=true;
  return tex;
}

const faceMats=faceData.map((_,i)=>new THREE.MeshPhysicalMaterial({
  map:makeFaceTex(i+1),color:0xffffff,
  roughness:.20,metalness:.06,clearcoat:1.0,clearcoatRoughness:.07,reflectivity:.88,
  emissive:new THREE.Color(0x1a0008),emissiveIntensity:.24,
}));

const diceGroup=new THREE.Group(); scene.add(diceGroup);
diceGroup.add(new THREE.Mesh(baseGeo,faceMats));
diceGroup.add(new THREE.LineSegments(new THREE.EdgesGeometry(origGeo),
  new THREE.LineBasicMaterial({color:0xffe898,transparent:true,opacity:.80})));

(function(){
  const cv=document.createElement('canvas');cv.width=cv.height=256;
  const ctx=cv.getContext('2d');
  const gr=ctx.createRadialGradient(128,128,8,128,128,118);
  gr.addColorStop(0,'rgba(0,0,0,.55)');gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gr;ctx.fillRect(0,0,256,256);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,depthWrite:false}));
  sp.position.set(0,-2.75,-0.3);sp.scale.set(5.2,2.0,1);
  scene.add(sp);window._sh=sp;
})();
const shadow=window._sh;

function getFaceQ(num){
  const fd=faceData.find(f=>f.number===num);
  if(!fd) return diceGroup.quaternion.clone();
  const forward=new THREE.Vector3(0,0,1),screenUp=new THREE.Vector3(0,1,0);
  const q1=new THREE.Quaternion().setFromUnitVectors(fd.normalLocal.clone().normalize(),forward);
  const tVr=fd.tV.clone().applyQuaternion(q1);tVr.z=0;
  if(tVr.lengthSq()<1e-4) return q1;
  tVr.normalize();
  const q2=new THREE.Quaternion().setFromUnitVectors(tVr,screenUp);
  return new THREE.Quaternion().multiplyQuaternions(q2,q1);
}

/* ══════════════════════════════════════════════
   ESTADOS
══════════════════════════════════════════════ */
const S={IDLE:0,ROLLING:1,SETTLING:2,SETTLED:3};
let state=S.IDLE,targetQ=null,rollResult=null,rollStart=0;
const ROLL_DUR=2.0;
let arc={x:0,y:0,sx:1,sy:1.3,sz:.7};
let bumpActive=false,bumpStart=0;
let jumpActive=false,jumpStart=0;
let shakeActive=false,shakeStart=0; // sacudida para desastre

const clock=new THREE.Clock();
diceGroup.rotation.set(0.4,0.5,0.18);

function setEmissive(v){for(let i=0;i<faceMats.length;i++)faceMats[i].emissiveIntensity=v;}
function setEmissiveColor(hex){for(let i=0;i<faceMats.length;i++)faceMats[i].emissive.setHex(hex);}

function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  switch(state){
    case S.IDLE:{
      diceGroup.rotation.x+=.0050;diceGroup.rotation.y+=.0076;diceGroup.rotation.z+=.0033;
      diceGroup.position.y=Math.sin(t*1.55)*.09;
      shadow.material.opacity=0.26-Math.sin(t*1.55)*.04;
      setEmissive(0.24+Math.sin(t*2.1)*.04);break;
    }
    case S.ROLLING:{
      const p=Math.min((t-rollStart)/ROLL_DUR,1.0);
      if(p<1.0){
        const env=Math.sin(p*Math.PI);
        diceGroup.position.x=arc.x*env;
        diceGroup.position.y=arc.y*env+Math.sin(p*Math.PI*3)*.22*(1-p);
        const sp=0.38*Math.pow(1-p,0.4);
        diceGroup.rotation.x+=sp*arc.sx;diceGroup.rotation.y+=sp*arc.sy;diceGroup.rotation.z+=sp*arc.sz;
        shadow.material.opacity=0.16+env*.12;setEmissive(0.24+env*.22);
      }else{
        diceGroup.position.set(0,0,0);diceGroup.rotation.y+=.010;shadow.material.opacity=0.24;
        if(rollResult!==null){targetQ=getFaceQ(rollResult);state=S.SETTLING;}
      }
      break;
    }
    case S.SETTLING:{
      diceGroup.quaternion.slerp(targetQ,.10);
      diceGroup.position.x*=.88;diceGroup.position.y*=.88;
      shadow.material.opacity=0.26;setEmissive(0.26);
      if(diceGroup.quaternion.angleTo(targetQ)<0.005){
        diceGroup.quaternion.copy(targetQ);diceGroup.position.set(0,0,0);
        state=S.SETTLED;onSettled();
      }
      break;
    }
    case S.SETTLED:{
      const baseY=Math.sin(t*1.3)*.024;
      if(shakeActive){
        const bt=t-shakeStart;
        if(bt<0.7){
          const amp=(1-bt/0.7)*.18;
          diceGroup.position.x=Math.sin(bt*52)*amp;
          diceGroup.position.y=baseY+Math.sin(bt*48)*amp*.4;
        }else{shakeActive=false;diceGroup.position.set(0,baseY,0);}
      }else if(jumpActive){
        const bt=t-jumpStart;
        if(bt<0.65){diceGroup.position.y=baseY+Math.sin(bt/0.65*Math.PI)*.65;}
        else{jumpActive=false;diceGroup.position.y=baseY;}
      }else if(bumpActive){
        const bt=t-bumpStart;
        if(bt<0.5){diceGroup.position.y=-Math.sin(bt/0.5*Math.PI)*.7;}
        else{bumpActive=false;diceGroup.position.y=baseY;}
      }else{
        diceGroup.position.y=baseY;
      }
      shadow.material.opacity=0.25-Math.sin(t*1.3)*.02;
      setEmissive(0.25+Math.sin(t*1.8)*.055);break;
    }
  }
  renderer.render(scene,camera);
}
animate();

/* ══════════════════════════════════════════════
   UI
══════════════════════════════════════════════ */
const resultEl   =document.getElementById('result');
const modCountEl =document.getElementById('mod-counter');
const calcLineEl =document.getElementById('calc-line');
const outcomeEl  =document.getElementById('outcome');
const resultArea =document.getElementById('result-area');
const ftEl       =document.getElementById('floating-text');
const flashEl    =document.getElementById('flash-overlay');
const btnEl      =document.getElementById('btn');

function clearOutcome(){
  calcLineEl.className='';calcLineEl.innerHTML='';
  outcomeEl.className='';outcomeEl.textContent='';
  modCountEl.className='';modCountEl.textContent='';
  ftEl.className='';ftEl.textContent='';
}

function triggerFlash(type){
  flashEl.className='';
  void flashEl.offsetWidth;
  flashEl.className=type;
}

function spawnSparkles(count=10){
  const chars=['✦','✧','★','⬟','◆'];
  for(let i=0;i<count;i++){
    const s=document.createElement('span'); s.className='sparkle';
    s.textContent=chars[Math.floor(Math.random()*chars.length)];
    const tx=(Math.random()-.5)*140,ty=-(30+Math.random()*80),tr=(Math.random()-.5)*560;
    s.style.cssText=`left:${30+Math.random()*40}%;top:${15+Math.random()*50}%;color:hsl(${42+Math.random()*20},100%,${65+Math.random()*20}%);font-size:${9+Math.random()*12}px;animation-delay:${Math.random()*.3}s;animation-duration:${.7+Math.random()*.5}s;--tx:${tx}px;--ty:${ty}px;--tr:${tr}deg;`;
    resultArea.appendChild(s);setTimeout(()=>s.remove(),1600);
  }
}

function showFloatingText(text,type){
  ftEl.textContent=text;
  ftEl.className=''; void ftEl.offsetWidth;
  ftEl.className=type;
}

/* ── TICK del número ── */
function setResultTick(num){
  resultEl.classList.remove('tick');void resultEl.offsetWidth;
  resultEl.textContent=num;resultEl.classList.add('tick');
}

/* ── Animación del modificador ── */
function animateModifier(dieRoll,mod,onDone){
  const absSteps=Math.abs(mod),sign=mod>=0?1:-1;
  const stepMs=Math.max(110,180-absSteps*5);
  if(absSteps===0){onDone(dieRoll);return;}
  resultEl.textContent=dieRoll;resultEl.className='';
  modCountEl.textContent=mod>=0?`+${mod}`:`${mod}`;
  modCountEl.className=`show ${mod>0?'pos':'neg'}`;
  let cur=dieRoll,rem=mod,step=0;
  const iv=setInterval(()=>{
    cur+=sign;rem-=sign;step++;
    setResultTick(cur);
    modCountEl.textContent=rem>=0?`+${rem}`:`${rem}`;
    if(step>=absSteps){
      clearInterval(iv);
      setTimeout(()=>{
        modCountEl.className=mod>0?'pos':'neg';
        setTimeout(()=>{modCountEl.textContent='';onDone(cur);},260);
      },300);
    }
  },stepMs);
}

/* ── Resultado normal (con modificador) ── */
function finishResult(total,dieRoll,mod){
  const won=total>=dcVal;
  resultEl.classList.remove('tick');resultEl.textContent=total;
  resultEl.className=won?'won':'lost';
  if(mod!==0){
    const sign=mod>0?'+':'−',abs=Math.abs(mod),cls=mod>0?'mod-pos':'mod-neg';
    calcLineEl.innerHTML=`${dieRoll} <span class="${cls}">${sign}${abs}</span> = <span class="total">${total}</span> <span class="dc-ref">/ DC ${dcVal}</span>`;
  }else{
    calcLineEl.innerHTML=`<span class="total">${total}</span> <span class="dc-ref">/ DC ${dcVal}</span>`;
  }
  calcLineEl.classList.add('show');
  outcomeEl.textContent=won?'✓  Superado':'✗  Fallado';
  void outcomeEl.offsetWidth;
  outcomeEl.className=won?'show win':'show lose';
  if(won){jumpActive=true;jumpStart=clock.getElapsedTime();setEmissiveColor(0x102808);spawnSparkles(10);}
  else{bumpActive=true;bumpStart=clock.getElapsedTime();setEmissiveColor(0x1e0000);}
  btnEl.disabled=false;
}

/* ── CRÍTICO (20 natural) ── */
function handleCritical(){
  // Texto flotante dramático
  showFloatingText('Crítico', 'show-crit');
  triggerFlash('flash-gold');
  setEmissiveColor(0x281500);

  // Die salta
  jumpActive=true;jumpStart=clock.getElapsedTime();

  // Resultado después de un momento (mientras el texto flota)
  setTimeout(()=>{
    resultEl.textContent=20;resultEl.className='critical';
    modCountEl.className='';modCountEl.textContent=''; // no se muestra modificador
    calcLineEl.innerHTML=`d20 <span class="nat20">natural 20</span> — <span class="total">victoria automatica</span>`;
    calcLineEl.classList.add('show');
    outcomeEl.textContent='✓  Superado';
    void outcomeEl.offsetWidth;
    outcomeEl.className='show win';
    spawnSparkles(18);  // lluvia de chispas dobles
    btnEl.disabled=false;
  },700);
}

/* ── DESASTRE (1 natural) ── */
function handleDisaster(){
  // Texto flotante dramático
  showFloatingText('Desastre','show-disaster');
  triggerFlash('flash-crimson');
  setEmissiveColor(0x280000);

  // Die sacude
  shakeActive=true;shakeStart=clock.getElapsedTime();
  bumpActive=false; // no bump simultáneo

  setTimeout(()=>{
    resultEl.textContent=1;resultEl.className='disaster';
    modCountEl.className='';modCountEl.textContent=''; // no se muestra modificador
    calcLineEl.innerHTML=`d20 <span class="nat1">natural 1</span> — <span style="color:rgba(220,80,80,.8)">derrota automatica</span>`;
    calcLineEl.classList.add('show');
    outcomeEl.textContent='✗  Fallado';
    void outcomeEl.offsetWidth;
    outcomeEl.className='show lose';
    // Bump hacia el texto después de que el shake termina
    setTimeout(()=>{bumpActive=true;bumpStart=clock.getElapsedTime();},450);
    btnEl.disabled=false;
  },700);
}

/* ── onSettled: punto de entrada principal ── */
function onSettled(){
  const dieRoll=rollResult;

  // Mostrar el número del dado primero
  resultEl.textContent=dieRoll;resultEl.className='';

  if(dieRoll===20){
    // CRÍTICO — no hay suma, victoria automática
    setTimeout(()=>handleCritical(),350);
  }else if(dieRoll===1){
    // DESASTRE — no hay suma, derrota automática
    setTimeout(()=>handleDisaster(),350);
  }else{
    // Tirada normal — animar modificador
    setTimeout(()=>{
      animateModifier(dieRoll,modVal,(finalNum)=>{
        finishResult(finalNum,dieRoll,modVal);
      });
    },380);
  }
}

function launch(){
  if(state===S.ROLLING||state===S.SETTLING) return;
  rollResult=null;
  fetch('/tirar/20').then(r=>r.json()).then(d=>{rollResult=d.resultado;}).catch(()=>{rollResult=Math.ceil(Math.random()*20);});
  arc={x:(Math.random()-.5)*2.8,y:.55+Math.random()*1.05,
    sx:(Math.random()>.5?1:-1)*(.9+Math.random()*.35),
    sy:(Math.random()>.5?1:-1)*(1.1+Math.random()*.35),
    sz:(Math.random()>.5?1:-1)*(.65+Math.random()*.25)};
  rollStart=clock.getElapsedTime();state=S.ROLLING;
  btnEl.disabled=true;
  resultEl.className='rolling';resultEl.textContent='...';
  clearOutcome();setEmissiveColor(0x1a0008);
}

function onResize(){
  const w=wrap.clientWidth,h=wrap.clientHeight;
  camera.aspect=w/h;camera.updateProjectionMatrix();
  renderer.setSize(w,h);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
}
window.addEventListener('resize',onResize);onResize();
</script>
